<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Basic SEO -->
    <title>Lagna | Fullstack Developer Portfolio</title>
    <meta
      name="description"
      content="Portfolio of Lagna, a Fullstack Developer focused on React, TypeScript, clean UI architecture, backend integration, and production-ready web applications."
    />
    <meta
      name="keywords"
      content="Lagna, 5erax, Fullstack Developer, Frontend Developer, React Developer, TypeScript, Node.js, Spring Boot, Portfolio, Vietnam Developer"
    />
    <meta name="author" content="Lagna" />
    <meta name="robots" content="index, follow" />

    <!-- Theme -->
    <meta name="theme-color" content="#050505" />
    <meta name="color-scheme" content="dark" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://pf-sigma-seven.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lagna | Fullstack Developer Portfolio" />
    <meta
      property="og:description"
      content="Fullstack Developer portfolio focused on React, TypeScript, clean UI systems, backend integration, and production-ready product experiences."
    />
    <meta property="og:url" content="https://pf-sigma-seven.vercel.app/" />
    <meta property="og:site_name" content="Lagna Portfolio" />
    <meta property="og:image" content="https://pf-sigma-seven.vercel.app/og-image.png" />
    <meta property="og:image:alt" content="Lagna Fullstack Developer Portfolio" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lagna | Fullstack Developer Portfolio" />
    <meta
      name="twitter:description"
      content="Fullstack Developer focused on React, TypeScript, clean UI architecture, and practical fullstack product development."
    />
    <meta name="twitter:image" content="https://pf-sigma-seven.vercel.app/og-image.png" />

    <!-- Performance hints -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- Prevent white flash before React loads -->
    <style>
      html {
        background: #050505;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background: #050505;
        color: #ffffff;
        text-rendering: geometricPrecision;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        min-height: 100vh;
      }

      ::selection {
        background: rgba(255, 255, 255, 0.18);
        color: #ffffff;
      }

      noscript {
        display: block;
        padding: 24px;
        color: #ffffff;
        background: #050505;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }
    </style>

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Lagna",
        "alternateName": "5erax",
        "jobTitle": "Fullstack Developer",
        "url": "https://pf-sigma-seven.vercel.app/",
        "sameAs": [
          "https://github.com/5erax",
          "https://linkedin.com/in/dha2608"
        ],
        "knowsAbout": [
          "React",
          "TypeScript",
          "Node.js",
          "Spring Boot",
          "Tailwind CSS",
          "Frontend Architecture",
          "Fullstack Development",
          "UI/UX"
        ],
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "Vietnam"
        }
      }
    </script>
  </head>

  <body>
    <noscript>
      This portfolio requires JavaScript to display the interactive experience.
      Please enable JavaScript in your browser.
    </noscript>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
